name: "Link Check (external, weekly)"

# 배포 CI(html-proofer)는 --disable-external이라 외부 링크 rot을 못 잡는다.
# 이 워크플로가 매주 콘텐츠(_tabs, _posts)의 외부 링크만 검사한다.
on:
  schedule:
    - cron: "0 21 * * 5" # 토요일 06:00 KST (금 21:00 UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check external links in content
        uses: lycheeverse/lychee-action@v2
        env:
          # github.com 링크 rate-limit 완화
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # --base-url: 루트 상대 링크(/projects/ 등)를 라이브 사이트 기준으로 해석·검사
          # --accept 999: LinkedIn의 봇 차단 응답 코드(오탐 방지)
          args: >-
            --no-progress
            --base-url 'https://arti1117.github.io'
            --accept '200..=299,999'
            --max-retries 3
            './_tabs/*.md' './_posts/*.md' 'README.md'
          fail: true
