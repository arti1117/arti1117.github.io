name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            \-\-disable-external \
            \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Notify IndexNow-participating search engines (Bing, Naver, Yandex, ...)
  # after each deploy. Best-effort: a ping failure must not mark the deploy red.
  # The key is public by design — it is served at the site root for verification.
  indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    env:
      INDEXNOW_KEY: a49ee281e89b426a9846bd39c7534996
      SITE_HOST: arti1117.github.io
    steps:
      - name: Ping IndexNow with sitemap URLs
        run: |
          urls=$(curl -sf "https://${SITE_HOST}/sitemap.xml" \
            | grep -oE '<loc>[^<]*</loc>' \
            | sed -E 's|</?loc>||g' \
            | sed 's/.*/"&"/' | paste -sd,)
          if [ -z "$urls" ]; then
            echo "::warning::no URLs extracted from sitemap"
            exit 1
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"${SITE_HOST}\",\"key\":\"${INDEXNOW_KEY}\",\"keyLocation\":\"https://${SITE_HOST}/${INDEXNOW_KEY}.txt\",\"urlList\":[$urls]}")
          echo "IndexNow response: $code"
          case "$code" in
            200|202) ;;
            *) echo "::warning::IndexNow ping failed with HTTP $code"; exit 1 ;;
          esac
